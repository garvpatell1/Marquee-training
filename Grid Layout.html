<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body, .body {
        background-color: darkmagenta;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(3, 200px);
        grid-template-rows: repeat(3, 200px);
        gap: 10px;
    }
    .item1 {
        background-color: rgba(56, 3, 52, 0.817);
        border-radius: 20px;
    }
    .item2 {
        background-color: rgba(56, 3, 52, 0.817);
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .item2 h1 {
        color: white;
    }
    .item3 {
        background-color: rgba(56, 3, 52, 0.817);
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .item3 h1 {
        color: white;
    }
    .item4 {
        background-color: rgba(56, 3, 52, 0.817);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
        gap: 8px;
    }
    .item4 .active,
    .item4 .growth,
    .item4 .total {
        color: white;
    }
    .item4 .active {
        font-size: 18px;
        font-weight: 600;
    }
    .item4 .growth {
        font-size: 16px;
        color: rgb(245, 249, 245);
    }
    .item4 .total h1 {
        margin: 0;
        font-size: 40px;
    }
    .item5 { 
        background-color: rgb(233, 20, 244);
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }
    .item6 {
        background-color: white;
        grid-row: 2/4;
        grid-column: 3/4;
        border-radius: 20px;
    }

    .box1 {
        background-color: white;
        border-radius: 20px;
        display: inline-block;
    }
    .box2 {
        background-color: white;
        border-radius: 20px;
        display: inline-block;
        text-align: end;
        margin-left: 40px;
    }
    
    .box3 {
        background-color: rgb(254, 254, 254);
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: end;
        margin-top: 75px;
        font-size: 90px;
    }
    .item7 {
        background-color: rgba(56, 3, 52, 0.817);
        grid-column: 1/3;
        border-radius: 20px;
    }
    .item7 p {
        color: white;
    }
</style>
<body>
    <div class="grid">
        <div class="item1"></div>
        <div class="item2">
            <h1>25k</h1>
        </div>
        <div class="item3">
            <h1>50k</h1>
        </div>
        <div class="item4">
            <div class="active">ActiveUsers</div>
            <div class="growth">
                <p>+154</p>
            </div>
            <div class="total">
                <h1>1,538</h1>
            </div>
        </div>
        <div class="item5">
            <h1>DESIGN</h1>
        </div>
        <div class="item6">

            <div class="box1">
                <p>Total Subscribers</p>
            </div>
            <div class="box2">
                <p>+1000</p>
            </div>
            <div class="box3">
                <p>200K</p>
            </div>
        </div>
        <div class="item7">
            <p>A place to learn UI Design & <br> Web Design</p>
        </div>
        </div>
    </div>
</body>
</html>
